apiVersion: v1
kind: Pod
metadata:
  name: oom
spec:
  containers:
    - name: c
      image: polinux/stress
      command:
        - "stress"
      args:
        - "--vm"
        - "1"
        - "--vm-bytes"
        - "200M"
        - "--vm-hang"
        - "0"
      resources:
        limits:
          memory: "32Mi"
