apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: jfrog-pull-secret
spec:
  refreshInterval: 1h                   # re-read from AWS every hour
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: jfrog-pull-secret             # the K8s Secret this produces
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        # Build a docker config JSON from the fields stored in AWS Secrets Manager.
        .dockerconfigjson: |
          {
            "auths": {
              "{{ .server }}": {
                "username": "{{ .username }}",
                "password": "{{ .password }}",
                "email": "{{ .email }}"
              }
            }
          }
  data:
    - secretKey: server
      remoteRef:
        key: devops/jfrog-pull-secret   # AWS Secrets Manager secret name
        property: server
    - secretKey: username
      remoteRef:
        key: devops/jfrog-pull-secret
        property: username
    - secretKey: password
      remoteRef:
        key: devops/jfrog-pull-secret
        property: password
    - secretKey: email
      remoteRef:
        key: devops/jfrog-pull-secret
        property: email
