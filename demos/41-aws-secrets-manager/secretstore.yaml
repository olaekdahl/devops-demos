apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-west-2                 # match REGION used by setup-aws-secret.sh
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa   # IRSA-bound SA created by setup script
            namespace: external-secrets
