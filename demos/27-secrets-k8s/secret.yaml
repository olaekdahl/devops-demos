apiVersion: v1
kind: Secret
metadata:
  name: jfrog-pull-secret
type: kubernetes.io/dockerconfigjson
stringData:
  # YAML equivalent of:
  # kubectl create secret docker-registry jfrog-pull-secret \
  #   --docker-server=<artifactory-url> \
  #   --docker-username=<your-username> \
  #   --docker-password=<your-api-key-or-password> \
  #   --docker-email=<your-email>
  .dockerconfigjson: |
    {
      "auths": {
        "<artifactory-url>": {
          "username": "<your-username>",
          "password": "<your-api-key-or-password>",
          "email": "<your-email>"
        }
      }
    }