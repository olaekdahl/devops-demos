apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig
metadata:
  name: devops-cluster
  region: us-west-2
nodeGroups:
  - name: single-node-group
    instanceType: t3.medium
    desiredCapacity: 1
    minSize: 1
    maxSize: 1
    amiFamily: AmazonLinux2023           # AL2 is unsupported on K8s 1.33+
iam:
  withOIDC: true                        # required for IRSA / LBC
