apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-app
  template:
    metadata:
      labels:
        app: devops-app
    spec:
      imagePullSecrets:
        - name: jfrog-pull-secret   # used by kubelet
      containers:
        - name: app
          # Substitute placeholders before applying.
          image: __ARTIFACTORY_URL__/__REPO__/__INITIALS__-devops:1.0.0
          imagePullPolicy: Always   # for demo so the pull is observable
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: devops-app-svc
spec:
  selector:
    app: devops-app
  ports:
    - port: 80
      targetPort: 8000
  type: NodePort
